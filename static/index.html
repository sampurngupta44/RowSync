<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RowSync</title>
  <link rel="stylesheet" href="/static/vendor/fonts/fonts.css" />
  <link rel="stylesheet" href="/static/vendor/codemirror/codemirror.min.css" />
  <link rel="stylesheet" href="/static/vendor/codemirror/theme/dracula.min.css" />
  <link rel="stylesheet" href="/static/vendor/codemirror/addon/hint/show-hint.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h10M4 17h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="19" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            <path d="M19 9v6M16 12h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>RowSync</h1>
          <p class="brand-tagline">Production → target database sync</p>
        </div>
      </div>

      <div class="toolbar">
        <div id="schema-status" class="status-pill loading">
          <span class="status-dot"></span>
          <span class="status-text">Loading schema…</span>
        </div>

        <div class="control-group">
          <label for="target-select">Target</label>
          <div class="select-wrap">
            <select id="target-select"></select>
          </div>
        </div>

        <div class="btn-group">
          <button id="run-btn" class="btn btn-secondary" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 5v14l11-7L8 5z" fill="currentColor"/></svg>
            Preview
          </button>
          <button id="apply-btn" class="btn btn-primary" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12m0 0l4-4m-4 4l-4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Apply
          </button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="card card-editor">
        <div class="card-head">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            SQL Editor
          </div>
          <span class="badge badge-muted">SELECT only</span>
        </div>
        <div class="editor-shell">
          <textarea id="sql-editor"></textarea>
        </div>
        <div class="editor-hint">Ctrl+Space autocomplete · Ctrl+Enter preview</div>
      </section>

      <section class="card card-preview">
        <div class="card-head">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16M4 10h16M4 14h10M4 18h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Preview
          </div>
          <span id="preview-meta" class="badge badge-accent"></span>
        </div>
        <div class="table-shell">
          <div id="preview-empty" class="empty-state">
            <div class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 10h18M8 5V3m8 2V3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </div>
            <p>Run preview to see rows from production</p>
          </div>
          <table class="data-table hidden" id="preview-table">
            <thead id="preview-head"></thead>
            <tbody id="preview-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card card-log">
        <div class="card-head">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16v12H4V6zm4 4h8m-8 4h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Progress
          </div>
        </div>
        <div id="log-output" class="log-output">
          <p class="log-line muted">Ready.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/vendor/codemirror/codemirror.min.js"></script>
  <script src="/static/vendor/codemirror/mode/sql/sql.min.js"></script>
  <script src="/static/vendor/codemirror/addon/hint/show-hint.min.js"></script>
  <script src="/static/vendor/codemirror/addon/hint/sql-hint.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
